<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Plate shadow -->
  <rect x="2.5" y="9" width="27" height="15" rx="3" fill="#555"/>
  <!-- Plate body (white) -->
  <rect x="2" y="8" width="27" height="15" rx="3" fill="#f5f5f5"/>
  <!-- EU blue strip -->
  <rect x="2" y="8" width="7.5" height="15" rx="3" fill="#003399"/>
  <!-- Square off right side of blue strip -->
  <rect x="6.5" y="8" width="3" height="15" fill="#003399"/>
  <!-- Yellow star above GR -->
  <polygon points="8,11.5 8.5,13 10,13 8.8,13.9 9.3,15.4 8,14.5 6.7,15.4 7.2,13.9 6,13 7.5,13"
           transform="translate(-3.5, -2) scale(0.65)"
           fill="#FFCC00"/>
  <!-- GR text on blue strip -->
  <text x="5.75" y="20.5" font-family="Arial, Helvetica, sans-serif" font-size="4.5"
        font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.2">GR</text>
  <!-- Plate characters -->
  <text x="19.5" y="20" font-family="Arial, Helvetica, sans-serif" font-size="9"
        font-weight="900" fill="#111" text-anchor="middle">ΑΒΓ</text>
</svg>
